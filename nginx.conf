server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets can be cached forever (filename changes on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — THIS fixes the 404-on-reload.
    # Any path that is not a real file is served index.html, then React Router
    # (client-side) renders the correct page.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
